<!DOCTYPE html>
<html>
<head>
    <title>Quiz Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        img {
            width: 250px;
            height: 150px;
            border-radius: 10px;
        }

        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        #nextBtn, #restartBtn {
            background-color: #4CAF50;
            color: white;
        }

        #score {
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>General Knowledge Quiz</h1>

    <p id="score">Score: 0</p>

    <img id="questionImage" src="" alt="Question Image">

    <h2 id="question"></h2>

    <div id="answers"></div>

    <button id="nextBtn">Next Question</button>
    <button id="restartBtn">Restart Quiz</button>
</div>

<script>
const quizData = [
{
question: "What is the capital of India?",
image: "https://images.unsplash.com/photo-1524492412937-b28074a5d7da",
answers: ["Mumbai", "Delhi", "Kolkata", "Chennai"],
correct: "Delhi"
},
{
question: "Which planet is known as the Red Planet?",
image: "https://images.unsplash.com/photo-1614728263952-84ea256f9679",
answers: ["Earth", "Mars", "Venus", "Jupiter"],
correct: "Mars"
},
{
question: "How many continents are there?",
image: "",
answers: ["5", "6", "7", "8"],
correct: "7"
},
{
question: "Which animal is called the King of the Jungle?",
image: "",
answers: ["Tiger", "Elephant", "Lion", "Bear"],
correct: "Lion"
},
{
question: "What is 5 + 7?",
image: "",
answers: ["10", "11", "12", "13"],
correct: "12"
},
{
question: "Which is the largest ocean?",
image: "",
answers: ["Atlantic", "Pacific", "Indian", "Arctic"],
correct: "Pacific"
},
{
question: "What color is the sky on a clear day?",
image: "",
answers: ["Blue", "Green", "Red", "Yellow"],
correct: "Blue"
},
{
question: "Which bird cannot fly?",
image: "",
answers: ["Parrot", "Crow", "Penguin", "Sparrow"],
correct: "Penguin"
},
{
question: "How many days are in a week?",
image: "",
answers: ["5", "6", "7", "8"],
correct: "7"
},
{
question: "Which is the national animal of India?",
image: "",
answers: ["Lion", "Tiger", "Elephant", "Leopard"],
correct: "Tiger"
}
];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const scoreEl = document.getElementById("score");
const imageEl = document.getElementById("questionImage");

function loadQuestion() {
    const q = quizData[currentQuestion];

    questionEl.textContent = q.question;
    answersEl.innerHTML = "";

    imageEl.src = q.image || "";
    imageEl.style.display = q.image ? "block" : "none";

    q.answers.forEach(answer => {
        const btn = document.createElement("button");
        btn.textContent = answer;

        btn.onclick = () => {
            if(answer === q.correct) {
                score++;
                scoreEl.textContent = "Score: " + score;
            }

            Array.from(answersEl.children).forEach(button => {
                button.disabled = true;
            });
        };

        answersEl.appendChild(btn);
    });
}

document.getElementById("nextBtn").addEventListener("click", () => {
    currentQuestion++;

    if(currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        questionEl.textContent = "Quiz Finished!";
        answersEl.innerHTML = "";
        imageEl.style.display = "none";
    }
});

document.getElementById("restartBtn").addEventListener("click", () => {
    currentQuestion = 0;
    score = 0;
    scoreEl.textContent = "Score: 0";
    loadQuestion();
});

loadQuestion();
</script>

</body>
</html>
